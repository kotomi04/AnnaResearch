<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>LLM / Agent Test</title>
    <link rel="stylesheet" href="style.css" />
    <script src="/static/anna-apps/_sdk/0.1.0/index.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <h1>LLM / Agent Test</h1>
          <p>测试 App 直调 LLM/Agent，以及后端 Executa 通过 reverse RPC 调用 sampling 和 agent session。</p>
        </div>
        <span id="connection" class="pill">Standalone</span>
      </header>

      <section class="panel" aria-label="LLM and agent input">
        <label for="prompt">输入内容</label>
        <textarea id="prompt" rows="6" placeholder="比如：用三句话解释什么是 Anna Sampling，并给一个使用场景。"></textarea>
        <div class="actions">
          <button id="app-complete" type="button" disabled>App LLM</button>
          <button id="app-agent" type="button" disabled>App Agent</button>
          <button id="tool-sampling" type="button" disabled>Tool Sampling</button>
          <button id="tool-agent" type="button" disabled>Tool Agent</button>
        </div>
      </section>

      <section class="panel" aria-label="LLM output">
        <div class="output-header">
          <h2>返回结果</h2>
          <span id="status" class="muted">Ready</span>
        </div>
        <pre id="output">结果会显示在这里。</pre>
      </section>
    </main>
  </body>
</html>
